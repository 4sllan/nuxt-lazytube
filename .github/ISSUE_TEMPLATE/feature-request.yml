name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve Nuxt Lazytube? Awesome 🔥

  - type: dropdown
    id: platform
    attributes:
      label: Related platform
      options:
        - YouTube
        - Vimeo
        - Both
        - Core module
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: What area does this impact?
      options:
        - Video loading
        - Component props
        - Thumbnail quality
        - Iframe behavior
        - Documentation
        - DX (Developer Experience)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: Explain your idea clearly.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Why is this needed?
    validations:
      required: true